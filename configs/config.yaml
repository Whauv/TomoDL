seed: 42

paths:
  kaggle_root: "./data/kaggle/raw"
  train_csv: "./data/train.csv"
  val_csv: "./data/val.csv"
  test_csv: "./data/test.csv"
  output_dir: "./outputs"
  pretrain_ckpt: "./outputs/pretrain_mae.pt"
  finetune_ckpt: "./outputs/finetune_multitask.pt"
  submission_path: "./outputs/submission.csv"

data:
  patch_size: [96, 96, 96]
  num_workers: 4
  pin_memory: true
  hard_negative_ratio: 0.35
  boundary_margin: 16
  positive_radius: 6
  normalization:
    clip_min: -4.0
    clip_max: 4.0
  augment:
    enabled: true
    elastic_prob: 0.2
    flip_prob: 0.5
    noise_prob: 0.2
    contrast_prob: 0.2
  cache:
    mode: "memory"
    max_items: 24
  validate_manifest_on_load: true

model:
  encoder_name: "resnet18"
  encoder_in_channels: 1
  encoder_base_channels: 32
  decoder_channels: [256, 128, 64, 32]
  regression_hidden_dim: 128
  mae:
    mask_ratio: 0.75
    decoder_channels: 128
  ssl:
    temperature: 0.2
    projection_dim: 128

training:
  stage1:
    epochs: 50
    batch_size: 2
    lr: 0.0003
    weight_decay: 0.01
    ssl_mode: "mae"
    strong_ssl_augment: true
  stage2:
    epochs: 80
    batch_size: 2
    lr: 0.0002
    weight_decay: 0.01
    loss_weights:
      w1_seg: 0.7
      w2_reg: 0.3
  amp: true
  grad_clip_norm: 1.0
  scheduler:
    t_max: 80
    eta_min: 1.0e-6
  ohem:
    base_weight: 1.0
    hard_weight: 2.0
    fp_threshold: 0.5
    fp_penalty_weight: 0.1
  curriculum:
    enabled: true
    hard_negative_min_ratio: 0.1
    hard_negative_max_ratio: 0.35
  cleanlab:
    issue_fraction: 0.05

evaluation:
  voxel_tolerance: 10.0
  decision_threshold: 0.5
  tta_rotations: true
  tta_policy: "high_value"
  ensemble_weights:
    unet3d: 0.5
    resnet2d: 0.25
    detr3d: 0.25

tuning:
  n_trials: 50
  timeout_sec: null
  max_epochs_per_trial: 12

inference:
  batch_size: 1
  no_motor_threshold: 0.50
  low_memory_mode: true
  sliding_window_if_large: true
  window_overlap: 0.25
  instance_threshold: 0.5
  instance_min_size: 8
  instance_nms_distance: 6
