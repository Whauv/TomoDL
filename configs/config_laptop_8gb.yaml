seed: 42

paths:
  kaggle_root: "./data/kaggle/raw"
  train_csv: "./data/train.csv"
  val_csv: "./data/val.csv"
  test_csv: "./data/test.csv"
  output_dir: "./outputs_laptop"
  pretrain_ckpt: "./outputs_laptop/pretrain_mae.pt"
  finetune_ckpt: "./outputs_laptop/finetune_multitask.pt"
  submission_path: "./outputs_laptop/submission.csv"

data:
  patch_size: [64, 64, 64]
  num_workers: 2
  pin_memory: false
  hard_negative_ratio: 0.2
  boundary_margin: 12
  positive_radius: 5
  normalization:
    clip_min: -4.0
    clip_max: 4.0
  augment:
    enabled: true
    elastic_prob: 0.1
    flip_prob: 0.3
    noise_prob: 0.15
    contrast_prob: 0.15

model:
  encoder_name: "resnet18"
  encoder_in_channels: 1
  encoder_base_channels: 16
  decoder_channels: [128, 64, 32, 16]
  regression_hidden_dim: 64
  mae:
    mask_ratio: 0.75
    decoder_channels: 64

training:
  stage1:
    epochs: 3
    batch_size: 1
    lr: 0.0003
    weight_decay: 0.01
  stage2:
    epochs: 10
    batch_size: 1
    lr: 0.0002
    weight_decay: 0.01
    loss_weights:
      w1_seg: 0.7
      w2_reg: 0.3
  amp: true
  grad_clip_norm: 1.0
  scheduler:
    t_max: 10
    eta_min: 1.0e-6

evaluation:
  voxel_tolerance: 10.0
  decision_threshold: 0.5
  tta_rotations: false
  ensemble_weights:
    unet3d: 1.0
    resnet2d: 0.0
    detr3d: 0.0

tuning:
  n_trials: 10
  timeout_sec: null
  max_epochs_per_trial: 4

inference:
  batch_size: 1
  no_motor_threshold: 0.50
